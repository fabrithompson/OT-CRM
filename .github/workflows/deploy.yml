name: OT CRM — CI/CD

"on":
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test-backend:
    name: Backend — Tests & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Configurar Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolver dependencias Maven
        run: mvn dependency:resolve --no-transfer-progress -q

      - name: Compilar backend
        run: mvn compile --no-transfer-progress -q

      - name: Correr tests
        run: mvn test --no-transfer-progress
        env:
          # Testcontainers arranca su propio PostgreSQL — estas vars son ignoradas
          # por @DynamicPropertySource en BaseIntegrationTest, pero se necesitan
          # para que el contexto Spring arranque antes de que Testcontainers tome el control.
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/crm_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          # NO definir SPRING_JPA_HIBERNATE_DDL_AUTO: Flyway + ddl-auto=validate lo maneja
          JWT_SECRET: dGVzdEp3dFNlY3JldEtleVF1ZVRpZW5lUXVlU2VyTGFyZ2FQYXJhSG1hYw==
          BOT_SECRET_KEY: test-bot-key
          NODE_BOT_URL: http://localhost:3000
          APP_BASE_URL: http://localhost:8080
          APP_DEFAULT_ADMIN_PASSWORD: test1234
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          RESEND_API_KEY: test
          APP_EMAIL_ENABLED: "false"
          MERCADOPAGO_ACCESS_TOKEN: TEST-fake-token
          MERCADOPAGO_WEBHOOK_SECRET: test-webhook-secret-32chars-long!
          PAYPAL_CLIENT_ID: test
          PAYPAL_CLIENT_SECRET: test
          PAYPAL_MODE: sandbox
          PAYPAL_WEBHOOK_ID: test-webhook-id
          TELEGRAM_API_ID: "12345"
          TELEGRAM_API_HASH: fakehash
          APP_CORS_ORIGINS: http://localhost:5173

      - name: Build JAR de producción
        run: mvn package -DskipTests --no-transfer-progress -q


  test-frontend:
    name: Frontend — Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Configurar Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: Frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        working-directory: Frontend
        run: pnpm install --frozen-lockfile

      - name: Build de producción
        working-directory: Frontend
        run: pnpm run build
        env:
          VITE_API_URL: https://ot-crm.com

      - name: Verificar que el build generó archivos
        run: |
          if [ ! -d "Frontend/dist" ]; then
            echo "❌ El build no generó la carpeta dist"
            exit 1
          fi
          echo "✅ Build del frontend OK — $(ls Frontend/dist | wc -l) archivos generados"


  test-bot-whatsapp:
    name: Bot WhatsApp — Lint & syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Configurar pnpm
        # pnpm 9.x para coincidir con packageManager del Bot-Whatsapp. pnpm 10+
        # tiene bloqueos anti-supply-chain (blockExoticSubdeps, onlyBuiltDependencies)
        # que rompen el install de baileys/sharp/protobufjs en CI fresh.
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: Bot-Whatsapp/pnpm-lock.yaml

      - name: Instalar dependencias
        working-directory: Bot-Whatsapp
        run: pnpm install --frozen-lockfile

      - name: Verificar sintaxis de index.js
        working-directory: Bot-Whatsapp
        run: node --check index.js

      - name: Verificar que el archivo principal existe
        run: |
          if [ ! -f "Bot-Whatsapp/index.js" ]; then
            echo "❌ Bot-Whatsapp/index.js no encontrado"
            exit 1
          fi
          echo "✅ Bot WhatsApp OK"


  test-bot-telegram:
    name: Bot Telegram — Lint & syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Bot-Telegram/requirements.txt

      - name: Instalar dependencias
        working-directory: Bot-Telegram
        run: pip install -r requirements.txt

      - name: Verificar sintaxis de Python
        working-directory: Bot-Telegram
        run: python -m py_compile telegram_bridge.py && echo "✅ Bot Telegram OK"
